apiVersion: openidgroup.keycloak.m.crossplane.io/v1alpha1
kind: HardcodedRoleProtocolMapper
metadata:
  annotations:
    meta.upbound.io/example-id: openidgroup/v1alpha1/hardcodedroleprotocolmapper
  labels:
    testing.upbound.io/example-name: hardcoded_role_mapper
  name: hardcoded-role-mapper
  namespace: upbound-system
spec:
  forProvider:
    clientIdSelector:
      matchLabels:
        testing.upbound.io/example-name: openid_client
    name: hardcoded-role-mapper
    realmIdSelector:
      matchLabels:
        testing.upbound.io/example-name: realm
    roleIdSelector:
      matchLabels:
        testing.upbound.io/example-name: role

---

apiVersion: openidclient.keycloak.m.crossplane.io/v1alpha1
kind: Client
metadata:
  annotations:
    meta.upbound.io/example-id: openidgroup/v1alpha1/hardcodedroleprotocolmapper
  labels:
    testing.upbound.io/example-name: openid_client
  name: openid-client
  namespace: upbound-system
spec:
  forProvider:
    accessType: CONFIDENTIAL
    clientId: client
    enabled: true
    name: client
    realmIdSelector:
      matchLabels:
        testing.upbound.io/example-name: realm
    validRedirectUris:
    - http://localhost:8080/openid-callback

---

apiVersion: realm.keycloak.m.crossplane.io/v1alpha1
kind: Realm
metadata:
  annotations:
    meta.upbound.io/example-id: openidgroup/v1alpha1/hardcodedroleprotocolmapper
  labels:
    testing.upbound.io/example-name: realm
  name: realm
  namespace: upbound-system
spec:
  forProvider:
    enabled: true
    realm: my-realm

---

apiVersion: role.keycloak.m.crossplane.io/v1alpha1
kind: Role
metadata:
  annotations:
    meta.upbound.io/example-id: openidgroup/v1alpha1/hardcodedroleprotocolmapper
  labels:
    testing.upbound.io/example-name: role
  name: role
  namespace: upbound-system
spec:
  forProvider:
    name: my-role
    realmIdSelector:
      matchLabels:
        testing.upbound.io/example-name: realm
