apiVersion: openidgroup.keycloak.crossplane.io/v1alpha1
kind: HardcodedClaimProtocolMapper
metadata:
  annotations:
    meta.upbound.io/example-id: openidgroup/v1alpha1/hardcodedclaimprotocolmapper
  labels:
    testing.upbound.io/example-name: hardcoded_claim_mapper
  name: hardcoded-claim-mapper
spec:
  forProvider:
    claimName: foo
    claimValue: bar
    clientIdSelector:
      matchLabels:
        testing.upbound.io/example-name: openid_client
    name: hardcoded-claim-mapper
    realmIdSelector:
      matchLabels:
        testing.upbound.io/example-name: realm

---

apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: Client
metadata:
  annotations:
    meta.upbound.io/example-id: openidgroup/v1alpha1/hardcodedclaimprotocolmapper
  labels:
    testing.upbound.io/example-name: openid_client
  name: openid-client
spec:
  forProvider:
    accessType: CONFIDENTIAL
    clientId: client
    enabled: true
    name: client
    realmIdSelector:
      matchLabels:
        testing.upbound.io/example-name: realm
    validRedirectUris:
    - http://localhost:8080/openid-callback

---

apiVersion: realm.keycloak.crossplane.io/v1alpha1
kind: Realm
metadata:
  annotations:
    meta.upbound.io/example-id: openidgroup/v1alpha1/hardcodedclaimprotocolmapper
  labels:
    testing.upbound.io/example-name: realm
  name: realm
spec:
  forProvider:
    enabled: true
    realm: my-realm
