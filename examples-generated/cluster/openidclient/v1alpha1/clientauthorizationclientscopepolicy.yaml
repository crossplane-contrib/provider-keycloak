apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientAuthorizationClientScopePolicy
metadata:
  annotations:
    meta.upbound.io/example-id: openidclient/v1alpha1/clientauthorizationclientscopepolicy
  labels:
    testing.upbound.io/example-name: test
  name: test
spec:
  forProvider:
    decisionStrategy: AFFIRMATIVE
    description: test
    logic: POSITIVE
    name: test_policy_single
    realmIdSelector:
      matchLabels:
        testing.upbound.io/example-name: realm
    resourceServerIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test
    scope:
    - id: ${keycloak_openid_client_scope.test1.id}
      required: false

---

apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: Client
metadata:
  annotations:
    meta.upbound.io/example-id: openidclient/v1alpha1/clientauthorizationclientscopepolicy
  labels:
    testing.upbound.io/example-name: test
  name: test
spec:
  forProvider:
    accessType: CONFIDENTIAL
    authorization:
    - policyEnforcementMode: ENFORCING
    clientId: client_id
    realmIdSelector:
      matchLabels:
        testing.upbound.io/example-name: realm
    serviceAccountsEnabled: true

---

apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientScope
metadata:
  annotations:
    meta.upbound.io/example-id: openidclient/v1alpha1/clientauthorizationclientscopepolicy
  labels:
    testing.upbound.io/example-name: test1
  name: test1
spec:
  forProvider:
    description: test1
    name: test1
    realmIdSelector:
      matchLabels:
        testing.upbound.io/example-name: realm

---

apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientScope
metadata:
  annotations:
    meta.upbound.io/example-id: openidclient/v1alpha1/clientauthorizationclientscopepolicy
  labels:
    testing.upbound.io/example-name: test2
  name: test2
spec:
  forProvider:
    description: test2
    name: test2
    realmIdSelector:
      matchLabels:
        testing.upbound.io/example-name: realm

---

apiVersion: realm.keycloak.crossplane.io/v1alpha1
kind: Realm
metadata:
  annotations:
    meta.upbound.io/example-id: openidclient/v1alpha1/clientauthorizationclientscopepolicy
  labels:
    testing.upbound.io/example-name: realm
  name: realm
spec:
  forProvider:
    enabled: true
    realm: my-realm
