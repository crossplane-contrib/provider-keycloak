---
# Generic client protocol mapper
apiVersion: client.keycloak.crossplane.io/v1alpha1
kind: GenericClientProtocolMapper
metadata:
  name: generic-protocol-mapper
spec:
  forProvider:
    samlClientIdRef:
      name: saml-client
    config:
      attribute.name: custom-attribute
      attribute.nameformat: urn:oasis:names:tc:SAML:2.0:attrname-format:uri
      single: "false"
    name: generic-protocol-mapper
    protocol: saml
    protocolMapper: saml-user-attribute-mapper
    realmIdRef:
      name: "dev"
      policy:
        resolve: Always
  providerConfigRef:
    name: "keycloak-provider-config"

---
# Generic client role mapper
apiVersion: client.keycloak.crossplane.io/v1alpha1
kind: GenericClientRoleMapper
metadata:
  name: generic-role-mapper
spec:
  forProvider:
    samlClientIdRef:
      name: saml-client
    realmIdRef:
      name: "dev"
      policy:
        resolve: Always
    roleIdRef:
      name: "test-client"
      policy:
        resolve: Always
  providerConfigRef:
    name: "keycloak-provider-config"

---
# SAML user attribute protocol mapper
apiVersion: samlclient.keycloak.crossplane.io/v1alpha1
kind: SamlUserAttributeProtocolMapper
metadata:
  name: saml-user-attr-mapper
spec:
  forProvider:
    clientIdRef:
      name: saml-client
    name: saml-user-attribute
    realmIdRef:
      name: "dev"
      policy:
        resolve: Always
    samlAttributeName: "urn:oid:0.9.2342.19200300.100.1.3"
    samlAttributeNameFormat: urn:oasis:names:tc:SAML:2.0:attrname-format:uri
    userAttribute: email
  providerConfigRef:
    name: "keycloak-provider-config"

---
# SAML user property protocol mapper
apiVersion: samlclient.keycloak.crossplane.io/v1alpha1
kind: SamlUserPropertyProtocolMapper
metadata:
  name: saml-user-prop-mapper
spec:
  forProvider:
    clientIdRef:
      name: saml-client
    name: saml-user-property
    realmIdRef:
      name: "dev"
      policy:
        resolve: Always
    samlAttributeName: "urn:oid:0.9.2342.19200300.100.1.1"
    samlAttributeNameFormat: urn:oasis:names:tc:SAML:2.0:attrname-format:uri
    userProperty: username
  providerConfigRef:
    name: "keycloak-provider-config"
