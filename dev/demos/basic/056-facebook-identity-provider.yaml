apiVersion: oidc.keycloak.crossplane.io/v1alpha1
kind: FacebookIdentityProvider
metadata:
  name: facebook
spec:
  forProvider:
    alias: facebook
    clientIdSecretRef:
      key: client-id
      name: client-secret
      namespace: dev
    clientSecretSecretRef:
      key: client-secret
      name: client-secret
      namespace: dev
    fetchedFields: picture
    realmRef:
      name: "dev"
      policy:
        resolve: Always
    syncMode: IMPORT
    trustEmail: true
  providerConfigRef:
    name: "keycloak-provider-config"
