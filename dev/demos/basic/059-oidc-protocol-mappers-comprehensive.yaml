---
# OpenID protocol mappers comprehensive demo
# All mapper types that configure how user attributes are mapped in tokens
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: OpenidAudienceProtocolMapper
metadata:
  name: audience-mapper
spec:
  forProvider:
    clientRef:
      name: my-client
    name: audience
    protocolMapperName: oidc-audience-mapper
    realmRef:
      name: "dev"
      policy:
        resolve: Always
  providerConfigRef:
    name: "keycloak-provider-config"

---
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
