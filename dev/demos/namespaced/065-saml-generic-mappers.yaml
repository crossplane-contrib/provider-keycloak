---
# Generic client protocol mapper (namespaced)
apiVersion: client.keycloak.m.crossplane.io/v1alpha1
kind: GenericClientProtocolMapper
metadata:
  name: generic-protocol-mapper
  namespace: dev-ns
spec:
  forProvider:
    samlClientIdRef:
      name: saml-client
      namespace: dev-ns
    config:
      attribute.name: custom-attribute
      attribute.nameformat: urn:oasis:names:tc:SAML:2.0:attrname-format:uri
      single: "false"
    name: generic-protocol-mapper
    protocol: saml
    protocolMapper: saml-user-attribute-mapper
    realmIdRef:
      name: "dev"
      namespace: dev-ns
      policy:
        resolve: Always
  providerConfigRef:
    name: "keycloak-provider-config"
    kind: ProviderConfig

---
# Generic client role mapper (namespaced)
apiVersion: client.keycloak.m.crossplane.io/v1alpha1
kind: GenericClientRoleMapper
metadata:
  name: generic-role-mapper
  namespace: dev-ns
spec:
  forProvider:
    samlClientIdRef:
      name: saml-client
      namespace: dev-ns
    realmIdRef:
      name: "dev"
      namespace: dev-ns
      policy:
        resolve: Always
    roleIdRef:
      name: "test-client"
      namespace: dev-ns
      policy:
        resolve: Always
  providerConfigRef:
    name: "keycloak-provider-config"
    kind: ProviderConfig

---
# SAML user attribute protocol mapper (namespaced)
apiVersion: samlclient.keycloak.m.crossplane.io/v1alpha1
kind: UserAttributeProtocolMapper
metadata:
  name: saml-user-attr-mapper
  namespace: dev-ns
spec:
  forProvider:
    clientIdRef:
      name: saml-client
      namespace: dev-ns
    name: saml-user-attribute
    realmIdRef:
      name: "dev"
      namespace: dev-ns
      policy:
        resolve: Always
    samlAttributeName: "urn:oid:0.9.2342.19200300.100.1.3"
    samlAttributeNameFormat: urn:oasis:names:tc:SAML:2.0:attrname-format:uri
    userAttribute: email
  providerConfigRef:
    name: "keycloak-provider-config"
    kind: ProviderConfig

---
# SAML user property protocol mapper (namespaced)
apiVersion: samlclient.keycloak.m.crossplane.io/v1alpha1
kind: UserPropertyProtocolMapper
metadata:
  name: saml-user-prop-mapper
  namespace: dev-ns
spec:
  forProvider:
    clientIdRef:
      name: saml-client
      namespace: dev-ns
    name: saml-user-property
    realmIdRef:
      name: "dev"
      namespace: dev-ns
      policy:
        resolve: Always
    samlAttributeName: "urn:oid:0.9.2342.19200300.100.1.1"
    samlAttributeNameFormat: urn:oasis:names:tc:SAML:2.0:attrname-format:uri
    userProperty: username
  providerConfigRef:
    name: "keycloak-provider-config"
    kind: ProviderConfig
