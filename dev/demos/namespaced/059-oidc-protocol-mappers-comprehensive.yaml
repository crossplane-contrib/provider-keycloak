---
# OpenID group protocol mappers comprehensive demo (namespaced)
apiVersion: openidgroup.keycloak.m.crossplane.io/v1alpha1
kind: AudienceProtocolMapper
metadata:
  name: audience-mapper
  namespace: dev-ns
spec:
  forProvider:
    clientIdRef:
      name: test
      policy:
        resolve: Always
    includedCustomAudience: foo
    name: audience-mapper
    realmIdRef:
      name: "dev-ns"
      policy:
        resolve: Always
  providerConfigRef:
    name: "keycloak-provider-config"
    kind: ProviderConfig

