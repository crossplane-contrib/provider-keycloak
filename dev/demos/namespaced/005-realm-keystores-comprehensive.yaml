---
# Java Keystore (namespaced)
apiVersion: realm.keycloak.crossplane.io/v1alpha1
kind: RealmKeystoreJavaKeystore
metadata:
  name: java-keystore
  namespace: dev-ns
spec:
  forProvider:
    name: java-keystore
    priority: 100
    realmRef:
      name: "dev"
      namespace: dev-ns
      policy:
        resolve: Always
    keystorePasswordSecretRef:
      key: password
      name: keystore-secret
      namespace: dev-ns
  providerConfigRef:
    name: "keycloak-provider-config"
    namespace: dev-ns
