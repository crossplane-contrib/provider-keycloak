---
# AES Generated keystore (namespaced)
apiVersion: realm.keycloak.crossplane.io/v1alpha1
kind: RealmKeystoreAesGenerated
metadata:
  name: aes-keystore
  namespace: dev-ns
spec:
  forProvider:
    name: aes-generated
    priority: 100
    realmRef:
      name: "dev"
      namespace: dev-ns
      policy:
        resolve: Always
  providerConfigRef:
    name: "keycloak-provider-config"
    namespace: dev-ns

