# Dedicated group for the user-groups example.
# It must NOT be a group whose membership is managed authoritatively elsewhere
# (e.g. group "test" is managed by the Memberships/test-members example in
# 031-group-memberships.yaml). Two authoritative resources managing the same
# group's membership fight forever and make e2e tests flaky.
apiVersion: group.keycloak.m.crossplane.io/v1alpha1
kind: Group
metadata:
  name: user-groups-target
  namespace: dev-ns
spec:
  forProvider:
    name: user-groups-target
    realmId: dev-ns
  providerConfigRef:
    name: "keycloak-provider-config"
    kind: ProviderConfig
---
apiVersion: user.keycloak.m.crossplane.io/v1alpha1
kind: Groups
metadata:
  name: user-groups
  namespace: dev-ns
spec:
  forProvider:
    realmIdRef:
      name: "dev-ns"
      policy:
        resolve: Always
    groupIdsRefs:
      - name: user-groups-target
        policy:
          resolve: Always
    userIdRef:
      name: "tim-tester"
      policy:
        resolve: Always
  providerConfigRef:
    name: "keycloak-provider-config"
    kind: ProviderConfig
