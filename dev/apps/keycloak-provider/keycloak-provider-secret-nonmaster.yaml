---
# Secret used by the non-master-realm ProviderConfig to test that the provider
# gracefully handles the empty systemInfo.version returned by Keycloak >= 26.4
# when the authenticating service account is not a master-realm admin.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-nonmaster-credentials
  namespace: crossplane-system
  labels:
    type: provider-credentials
type: Opaque
stringData:
  credentials: |
    {
      "client_id": "provider-e2e-client",
      "client_secret": "provider-e2e-secret",
      "url": "http://$KEYCLOAK_IP:$KEYCLOAK_PORT",
      "base_path": "",
      "realm": "provider-e2e-realm"
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-nonmaster-credentials
  namespace: dev-ns
  labels:
    type: provider-credentials
type: Opaque
stringData:
  credentials: |
    {
      "client_id": "provider-e2e-client",
      "client_secret": "provider-e2e-secret",
      "url": "http://$KEYCLOAK_IP:$KEYCLOAK_PORT",
      "base_path": "",
      "realm": "provider-e2e-realm"
    }
