# kind cluster configuration with port mappings for Traefik and Keycloak
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080      # Traefik HTTP
      - containerPort: 30443
        hostPort: 8443      # Traefik HTTPS
      - containerPort: 30090
        hostPort: 9090      # Keycloak HTTP
