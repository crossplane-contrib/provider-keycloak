name: Deploy Docs PR Preview

on:
  pull_request:
    paths:
      - 'docs/**'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build documentation (PR preview)
        run: npm run build
        env:
          # Override baseUrl so links work under the preview path
          DOCUSAURUS_BASE_URL: /provider-keycloak/pr-preview/pr-${{ github.event.pull_request.number }}/

      - name: Deploy to GitHub Pages (preview)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build
          destination_dir: pr-preview/pr-${{ github.event.pull_request.number }}

      - name: Post or update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = `https://crossplane-contrib.github.io/provider-keycloak/pr-preview/pr-${context.payload.pull_request.number}/`;
            const body = `📖 **Docs preview is ready!**\n\n${previewUrl}\n\n<sub>Built from ${context.sha.substring(0, 7)} — updates automatically on new commits.</sub>`;
            const tag = '<!-- docs-preview -->';
            const taggedBody = `${tag}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c => c.body.includes(tag));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: taggedBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: taggedBody,
              });
            }
