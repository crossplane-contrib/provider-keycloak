name: Auto Release

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 08:00 UTC
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump level'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Check for relevant changes since last tag
        id: changes
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -n "$LATEST_TAG" ]]; then
            CHANGED=$(git diff --name-only "$LATEST_TAG"..HEAD -- go.mod go.sum)
            if [[ -z "$CHANGED" ]]; then
              echo "No changes in go.mod or go.sum since $LATEST_TAG — skipping release."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Changes detected since $LATEST_TAG:"
            echo "$CHANGED"
          else
            echo "No previous tag found — will create initial release."
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Verify CI passed on HEAD
        if: steps.changes.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_SHA=$(git rev-parse HEAD)
          echo "Checking CI status for commit $HEAD_SHA..."

          # Get the most recent CI workflow run conclusion for this commit
          LATEST_CONCLUSION=$(gh run list \
            --workflow=ci.yml \
            --commit="$HEAD_SHA" \
            --json conclusion,status \
            --jq '.[0].conclusion // .[0].status')

          if [[ -z "$LATEST_CONCLUSION" ]]; then
            echo "ERROR: No CI workflow run found for HEAD ($HEAD_SHA). Aborting release."
            exit 1
          fi

          if [[ "$LATEST_CONCLUSION" != "success" ]]; then
            echo "ERROR: Latest CI workflow run on HEAD ($HEAD_SHA) has conclusion '$LATEST_CONCLUSION'. Aborting release."
            echo "Ensure all CI checks (including e2e tests) pass before releasing."
            exit 1
          fi

          echo "CI passed on HEAD ($HEAD_SHA) — proceeding with release."

      - name: Determine version
        id: version
        if: steps.changes.outputs.skip != 'true'
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f3)

          BUMP="${{ inputs.bump || 'patch' }}"
          case "$BUMP" in
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Determined version: $VERSION"

      - name: Create and push tag
        if: steps.changes.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Auto-release $VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        if: steps.changes.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes
