baseURL: https://crossplane-contrib.github.io/provider-keycloak/
title: Provider Keycloak
languageCode: en-us

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

outputs:
  home: [HTML]
  section: [HTML, markdown]
  page: [HTML, markdown]

menu:
  main:
    - name: Documentation
      pageRef: /docs
      weight: 1
    - name: GitHub
      url: https://github.com/crossplane-contrib/provider-keycloak
      weight: 2
    - name: Releases
      url: https://github.com/crossplane-contrib/provider-keycloak/releases
      weight: 3

params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: /img/logo.svg
      dark: /img/logo.svg
      width: 24
      height: 24
  theme:
    default: system
    displayToggle: true
  search:
    enable: true
  editURL:
    enable: true
    base: https://github.com/crossplane-contrib/provider-keycloak/tree/main/docs/content
  page:
    contextMenu:
      enable: true
      links:
        - name: Open in ChatGPT
          url: "https://chatgpt.com/?q={markdown_url}"
          icon: chatgpt
